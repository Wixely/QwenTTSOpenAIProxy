services:
  qwen-tts-openai-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: qwen-tts-openai-proxy:latest
    container_name: qwen-tts-openai-proxy
    ports:
      - "8092:8092"
    environment:
      QWEN_BACKEND_BASE_URL: "http://qwen-tts:8091"
      QWEN_DEFAULT_MODEL: "Qwen/Qwen3-TTS-12Hz-0.6B-Base"
    networks:
      - qwen-tts-network

networks:
  qwen-tts-network:
    external: true
